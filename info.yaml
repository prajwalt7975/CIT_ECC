yaml_version: 6

project:
  title: "7-bit ALU"
  author: "Prajwal T, PM Likith Kumar"
  description: "7-bit Arithmetic Logic Unit using Verilog HDL"
  language: "Verilog"
  clock_hz: 0

  top_module: "tt_um_alu7b"

  source_files:
    - "tt_um_alu7b.v"
    - "serial_alu_ctrl.v"
    - "alu_7b.v"

pinout:
  ui[0]: "input A"
  ui[1]: "input B"
  ui[2]: "operation select"

  uo[0]: "result bit 0"
  uo[1]: "result bit 1"
  uo[2]: "result bit 2"
  uo[3]: "result bit 3"
  uo[4]: "result bit 4"
  uo[5]: "result bit 5"
  uo[6]: "result bit 6"
  uo[7]: "carry out"

  uio[0]: "unused"
  uio[1]: "unused"
  uio[2]: "unused"
  uio[3]: "unused"
  uio[4]: "unused"
  uio[5]: "unused"
  uio[6]: "unused"
  uio[7]: "unused"
